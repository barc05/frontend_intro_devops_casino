name: CI/CD Frontend - Vidal Casino

on:
  push:
    branches:
      - deploy 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/casino-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/casino-frontend:v1.0.0
            ${{ secrets.DOCKERHUB_USERNAME }}/casino-frontend:${{ github.sha }}

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH to AWS EC2 and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |

            docker stop casino_frontend || true
            docker rm casino_frontend || true
            
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/casino-frontend:latest

            docker run -d --name casino_frontend -p 80:8080 ${{ secrets.DOCKERHUB_USERNAME }}/casino-frontend:latest